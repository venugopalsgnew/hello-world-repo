name: secrets test from DEV environment

on:
  workflow_dispatch:

jobs:
  secrets_testing:
    runs-on: ubuntu-latest
    environment: DEV   # This ties the job to the DEV environment in your repo settings

    steps:
      - name: Show environment
        run: echo "Running in DEV environment"

      - name: Retrieve secrets and variables
        run: |
          echo "DB_PASSWORD=$DB_PASSWORD"
          echo "DB_PASSWORD2=$DB_PASSWORD2"
          echo "DB_USERNAME=$DB_USERNAME"
          echo "DB_USERNAME2=$DB_USERNAME2"
        env:
          DB_PASSWORD: ${{ secrets.DEV_SECRET1 }}
          DB_PASSWORD2: ${{ secrets.DEV_SECRET2 }}
          DB_USERNAME: ${{ vars.DEV_VAR1 }}
          DB_USERNAME2: ${{ vars.DEV_VAR2 }}
