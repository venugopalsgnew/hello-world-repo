name: Scripted Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - feature-testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Greet
        run: echo "Hello, World!"

      - name: Build
        run: |
          echo "Pretending to build..."
          sleep 5

      - name: Results
        run: echo "Job completed at $(date)"

        
